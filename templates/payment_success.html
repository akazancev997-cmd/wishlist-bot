<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .check { font-size: 4em; }
        h1 { margin: 20px 0 10px; color: #1a1a2e; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h1>Оплата прошла!</h1>
        <p>Премиум активирован. Теперь тебе доступны все возможности.</p>
        <a class="btn" href="https://t.me/your_bot_username">🚀 Вернуться в бота</a>
    </div>
</body>
</html>
