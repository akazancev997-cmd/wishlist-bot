<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WishlistBot Блог{% endblock %}</title>
    <meta name="description" content="{% block description %}Полезные статьи о вишлистах, подарках и организации праздников{% endblock %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            line-height: 1.8;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
            margin-bottom: 30px;
        }
        .header a { color: white; opacity: 0.8; text-decoration: none; }
        .header a:hover { opacity: 1; }
        .header h1 { font-size: 1.8em; margin: 10px 0; }
        .article {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }
        .article h1 { font-size: 1.5em; color: #1a1a2e; margin-bottom: 15px; }
        .article h2 { font-size: 1.2em; color: #667eea; margin: 25px 0 10px; }
        .article p { margin-bottom: 12px; color: #444; }
        .article ul { margin: 10px 0 15px 20px; }
        .article li { margin-bottom: 6px; color: #444; }
        .article .cta {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            margin: 25px 0 10px;
        }
        .meta { color: #999; font-size: 0.85em; margin-bottom: 20px; }
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.85em; }
        footer a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/">← На главную</a>
            <h1>{% block heading %}Блог WishlistBot{% endblock %}</h1>
        </div>
        <div class="article">
            <div class="meta">{% block date %}Июнь 2026{% endblock %} • 📖 3 мин чтения</div>
            {% block content %}{% endblock %}
            <a class="cta" href="https://t.me/rtfyhjkuyhtrgerf_bot" target="_blank">🚀 Создать вишлист в WishlistBot</a>
        </div>
        <footer>
            <p><a href="/">WishlistBot</a> — Telegram бот для вишлистов</p>
        </footer>
    </div>
</body>
</html>
